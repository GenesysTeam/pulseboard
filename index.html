<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <title>PulseBoard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Genuyn Live — auto-refresh when an edit is applied
      const sessionId = new URLSearchParams(location.search).get('genuyn_session')
      if (sessionId) {
        const wsBase = location.hostname === 'localhost'
          ? 'ws://localhost:3001'
          : 'wss://genuyn-live-production.up.railway.app'
        function connect() {
          const ws = new WebSocket(wsBase + '?session=' + sessionId)
          ws.onopen = () => console.log('[Genuyn] connected, watching session', sessionId)
          ws.onmessage = (e) => {
            const msg = JSON.parse(e.data)
            if (msg.type === 'refresh') location.reload()
          }
          ws.onclose = () => setTimeout(connect, 2000)
        }
        connect()
      }
    </script>
  </body>
</html>
